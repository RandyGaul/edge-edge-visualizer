<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>edge-edge-visualizer -- signed separation + Gauss map</title>
<style>
	:root { color-scheme: dark; }
	html, body {
		margin: 0;
		padding: 0;
		height: 100%;
		background: #0b0b10;
		color: #e6e6ee;
		font-family: -apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif;
		overflow: hidden;
		overscroll-behavior: none;
	}
	#wrap {
		display: flex;
		flex-direction: column;
		width: 100%;
		height: 100%;
	}
	header {
		padding: 8px 14px;
		border-bottom: 1px solid #22222c;
		font-size: 13px;
		display: flex;
		justify-content: space-between;
		align-items: center;
		background: #12121a;
		gap: 10px;
		flex-wrap: wrap;
	}
	header a {
		color: #8ab4ff;
		text-decoration: none;
	}
	header a:hover { text-decoration: underline; }
	header .hint {
		color: #888;
		font-size: 12px;
	}
	kbd {
		background: #1c1c26;
		border: 1px solid #2c2c38;
		border-radius: 3px;
		padding: 1px 5px;
		font-family: inherit;
		font-size: 11px;
		color: #c8c8d8;
	}
	#canvas {
		flex: 1;
		width: 100%;
		outline: none;
		display: block;
		touch-action: none;
	}
	#status {
		position: absolute;
		top: 50%;
		left: 50%;
		transform: translate(-50%, -50%);
		font-size: 14px;
		color: #aaa;
		text-align: center;
		pointer-events: none;
	}
	#progress {
		width: 300px;
		height: 6px;
		background: #222;
		margin: 8px auto;
		border-radius: 3px;
		overflow: hidden;
	}
	#progress > div {
		height: 100%;
		background: #8ab4ff;
		width: 0%;
		transition: width 120ms linear;
	}
</style>
</head>
<body>
<div id="wrap">
	<header>
		<span><strong>edge-edge-visualizer</strong> -- signed edge-edge separation + Gauss map</span>
		<span><a href="https://github.com/RandyGaul/edge-edge-visualizer" target="_blank" rel="noopener">source on GitHub</a></span>
	</header>
	<canvas id="canvas" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>
</div>

<div id="status">
	<div>loading edge-edge-visualizer...</div>
	<div id="progress"><div></div></div>
</div>

<script>
	document.addEventListener('contextmenu', function (e) { e.preventDefault(); }, { capture: true });
	document.addEventListener('auxclick', function (e) { e.preventDefault(); }, { capture: true });

	function sizeCanvas() {
		var header = document.querySelector('header');
		var headerH = header ? header.getBoundingClientRect().height : 0;
		var w = window.innerWidth;
		var h = window.innerHeight - headerH;
		var c = document.getElementById('canvas');
		c.style.width  = w + 'px';
		c.style.height = h + 'px';
		c.width  = w;
		c.height = h;
	}
	sizeCanvas();
	window.addEventListener('resize', sizeCanvas);

	var Module = {
		canvas: (function () {
			var c = document.getElementById('canvas');
			c.addEventListener('pointerdown', function (e) {
				c.focus();
				try { c.setPointerCapture(e.pointerId); } catch (err) {}
			});
			document.addEventListener('mouseup', function (e) {
				if (e.target !== c && e.button !== 0) {
					c.dispatchEvent(new MouseEvent('mouseup', {
						bubbles: true, cancelable: true,
						button: e.button, buttons: e.buttons,
						clientX: e.clientX, clientY: e.clientY,
					}));
				}
			}, { capture: true });
			c.addEventListener('webglcontextlost', function (e) {
				alert('WebGL context lost -- reload the page.');
				e.preventDefault();
			}, false);
			return c;
		})(),
		setStatus: function (text) {
			var s = document.getElementById('status');
			if (!text) { s.style.display = 'none'; return; }
			s.style.display = 'block';
			s.firstElementChild.textContent = text;
		},
		monitorRunDependencies: function (left) {
			var total = this.totalDependencies = Math.max(this.totalDependencies || 0, left);
			var pct = total ? ((total - left) / total) * 100 : 100;
			var bar = document.querySelector('#progress > div');
			if (bar) bar.style.width = pct + '%';
		},
		totalDependencies: 0,
		print: function (t) { console.log(t); },
		printErr: function (t) { console.warn(t); },
	};
	Module.setStatus('downloading...');
	window.onerror = function (e) { Module.setStatus('error -- see console'); };
</script>
{{{ SCRIPT }}}
</body>
</html>
